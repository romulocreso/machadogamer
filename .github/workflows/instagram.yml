name: Atualiza seguidores do Instagram

on:
  schedule:
    - cron: '0 */6 * * *'   # a cada 6 horas
  workflow_dispatch:         # permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ler dados públicos do perfil (meta og:description)
        run: |
          set -e
          USER=machadogameroficial
          HTML=$(curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                 "https://www.instagram.com/$USER/")
          DESC=$(printf '%s' "$HTML" | grep -oE '<meta property="og:description" content="[^"]*"' | head -1)
          echo "meta: $DESC"

          FOLLOWERS=$(printf '%s' "$DESC" | grep -oiE '[0-9][0-9.,KMB]* Followers' | grep -oiE '^[0-9][0-9.,KMB]*' || true)
          FOLLOWING=$(printf '%s' "$DESC" | grep -oiE '[0-9][0-9.,KMB]* Following' | grep -oiE '^[0-9][0-9.,KMB]*' || true)
          POSTS=$(printf '%s'   "$DESC" | grep -oiE '[0-9][0-9.,KMB]* Posts'     | grep -oiE '^[0-9][0-9.,KMB]*' || true)

          if [ -z "$FOLLOWERS" ]; then
            echo "::warning::Instagram nao retornou os dados (provavel bloqueio do runner). Mantendo o valor anterior."
            exit 0
          fi

          mkdir -p data
          printf '{\n  "followers": "%s",\n  "following": "%s",\n  "posts": "%s",\n  "updated": "%s"\n}\n' \
            "$FOLLOWERS" "$FOLLOWING" "$POSTS" "$(date -u +%FT%TZ)" > data/instagram.json
          echo "--- data/instagram.json ---"
          cat data/instagram.json

      - name: Commitar se houve mudanca
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/instagram.json
          if git diff --staged --quiet; then
            echo "Sem mudancas."
          else
            git commit -m "chore: atualiza seguidores do Instagram"
            git push
          fi
